<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col | Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #aa7c7c; --bg: #fcf8f5; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); background-image: url('https://www.transparenttextures.com/patterns/floral-wallpaper.png'); color: #4a3737; margin: 0; padding: 20px; }
        
        h1 { font-family: 'Playfair Display', serif; text-align: center; color: var(--primary); margin-bottom: 40px; }
        
        #contenedor-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 900px; margin: 0 auto; }
        
        .producto-card { background: white; padding: 20px; border-radius: 25px; border: 1px solid #efe8e8; display: flex; flex-direction: column; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .producto-card img { width: 100%; height: 300px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; }
        
        .titulo-prod { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin: 5px 0; }
        .desc-prod { font-size: 0.85rem; color: #777; margin-bottom: 10px; height: 40px; }
        .precio-prod { font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        
        select, input { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; }
        button { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        
        #modal-carrito { display:none; position:fixed; top:10%; right:5%; width:90%; max-width:400px; background:white; padding:20px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.2); z-index:1000; }
        .btn-flotante { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; padding: 15px 25px; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>IntimateGem.col</h1>
    <div id="contenedor-productos">Cargando catálogo...</div>
    <div class="btn-flotante" onclick="document.getElementById('modal-carrito').style.display='block'">🛒 Carrito</div>

    <div id="modal-carrito">
        <h2 style="font-family:'Playfair Display'">Tu Selección</h2>
        <div id="lista-detallada"></div>
        <button style="width:100%; margin-top:10px;" onclick="enviarWhatsApp()">Finalizar Pedido (WhatsApp)</button>
        <button style="width:100%; background:#ccc; margin-top:5px;" onclick="document.getElementById('modal-carrito').style.display='none'">Cerrar</button>
    </div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg/gviz/tq?tqx=out:json";
    let inventario = [], carrito = [];

    async function cargar() {
        const res = await (await fetch(url)).text();
        const json = JSON.parse(res.substr(47).slice(0, -2));
        inventario = json.table.rows.map(f => ({
            id: f.c[0]?.v, nombre: f.c[1]?.v, precio: f.c[2]?.v, foto1: f.c[3]?.v, 
            descripcion: f.c[7]?.v, tallas: ['XS', 'S', 'M', 'L', 'U']
        }));
        
        document.getElementById("contenedor-productos").innerHTML = inventario.map(p => `
            <div class="producto-card">
                <img src="${p.foto1}">
                <h3 class="titulo-prod">${p.nombre}</h3>
                <p class="desc-prod">${p.descripcion || 'Encaje premium'}</p>
                <p class="precio-prod">$${p.precio}</p>
                <select id="talla-${p.id}">${p.tallas.map(t => `<option>${t}</option>`).join('')}</select>
                <input type="number" id="cant-${p.id}" value="1" min="1">
                <button onclick="agregar('${p.id}')">Añadir al Carrito</button>
            </div>`).join('');
    }

    function agregar(id) {
        const p = inventario.find(i => i.id == id);
        carrito.push({ ...p, talla: document.getElementById(`talla-${id}`).value, cant: document.getElementById(`cant-${id}`).value });
        actualizarCarrito();
    }

    function actualizarCarrito() {
        document.getElementById("lista-detallada").innerHTML = carrito.map((item, i) => `
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:5px 0;">
                <span>${item.nombre} (T:${item.talla} x${item.cant})</span>
                <button onclick="carrito.splice(${i},1); actualizarCarrito()">X</button>
            </div>`).join('');
        document.getElementById("modal-carrito").style.display = 'block';
    }

    function enviarWhatsApp() {
        let msj = "¡Hola! Quiero este pedido:\n" + carrito.map(i => `\n- ${i.nombre} (Talla: ${i.talla}, Cant: ${i.cant})`).join('');
        window.open(`https://wa.me/573014816594?text=${encodeURIComponent(msj)}`);
    }

    cargar();
</script>
</body>
</html>
