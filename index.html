<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* Aplicando image_727bec.png como fondo */
            background-image: url('https://i.imgur.com/vHqQJd3.png');
            background-size: contain; /* Para que se vea el patrón completo */
            background-repeat: repeat;
            background-color: #fffaf5; /* Color crema suave de base */
            
            text-align: center;
            font-family: 'Poppins', sans-serif;
            padding-top: 80px;
        }

        .header-container {
            width: 100%;
        }

        /* Nombre elegante, sin ningún cuadro detrás */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 7rem;
            color: #8b5d5d;
            margin: 0;
            line-height: 1;
        }

        .eslogan {
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            color: #8b5d5d;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>IntimateGem.col ✨</h1>
        <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>
    </div>

</body>
</html>
