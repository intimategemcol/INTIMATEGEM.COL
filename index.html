<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntimateGem.col | Boutique Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { background: #fcf8f5; font-family: 'Poppins', sans-serif; color: #4a3737; margin: 0; padding: 20px; }
        h1 { font-family: 'Playfair Display'; text-align: center; color: #aa7c7c; }
        #contenedor-productos { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .producto-card { background: white; border-radius: 20px; padding: 20px; width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .foto-principal { width: 100%; height: 350px; object-fit: cover; border-radius: 15px; }
        select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; }
        .btn-carrito { background: #aa7c7c; color: white; border: none; padding: 12px; width: 100%; border-radius: 20px; cursor: pointer; }
        #icono-carrito { position: fixed; bottom: 20px; right: 20px; background: #25d366; padding: 15px 25px; border-radius: 30px; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <h1>IntimateGem.col</h1>
    <div id="contenedor-productos"></div>
    <div id="icono-carrito" onclick="mostrarCarrito()">Ver Pedido (0) 🛒</div>

<script>
    const idHoja = "1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg";
    const urlGSheets = `https://docs.google.com/spreadsheets/d/${idHoja}/gviz/tq?tqx=out:json`;
    let inventario = [], carrito = [];

    async function cargarTienda() {
        const respuesta = await fetch(urlGSheets);
        const datos = JSON.parse((await respuesta.text()).substr(47).slice(0, -2));
        inventario = datos.table.rows.map(f => ({
            id: f.c[0]?.v, nombre: f.c[1]?.v, precio: f.c[2]?.v, 
            foto1: f.c[3]?.v, estado: f.c[6]?.v, descripcion: f.c[7]?.v,
            tallas: f.c[8]?.v ? f.c[8].v.split(',') : ['U']
        }));
        dibujar();
    }

    function dibujar() {
        const cont = document.getElementById("contenedor-productos");
        inventario.forEach(p => {
            cont.innerHTML += `
                <div class="producto-card">
                    <img src="${p.foto1}" class="foto-principal">
                    <h3>${p.nombre}</h3>
                    <p>${p.descripcion}</p>
                    <p><b>$${p.precio.toLocaleString()} COP</b></p>
                    <select id="talla-${p.id}">${p.tallas.map(t => `<option>${t.trim()}</option>`).join('')}</select>
                    <button class="btn-carrito" onclick="agregar('${p.id}')">Añadir al Carrito</button>
                </div>`;
        });
    }

    function agregar(id) {
        const p = inventario.find(i => i.id == id);
        const talla = document.getElementById(`talla-${id}`).value;
        carrito.push({ ...p, talla });
        document.getElementById("icono-carrito").innerText = `Ver Pedido (${carrito.length}) 🛒`;
    }

    function mostrarCarrito() {
        if(carrito.length === 0) return alert("Tu carrito está vacío");
        let msj = "¡Hola! Quiero pedir: " + carrito.map(i => `\n- ${i.nombre} (Talla: ${i.talla})`).join('');
        window.open(`https://wa.me/573014816594?text=${encodeURIComponent(msj)}`, '_blank');
    }

    window.onload = cargarTienda;
</script>
</body>
</html>
