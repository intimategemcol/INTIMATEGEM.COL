<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col | Boutique Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #aa7c7c; --bg: #fcf8f5; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: #4a3737; margin: 0; padding: 20px; 
               background-image: url('https://www.transparenttextures.com/patterns/floral-wallpaper.png'); }
        h1 { font-family: 'Playfair Display', serif; text-align: center; color: var(--primary); }
        
        #contenedor-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        .producto-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #eee; text-align: center; }
        .producto-card img { width: 100%; height: 300px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        
        select, input { padding: 8px; margin: 5px; border-radius: 10px; border: 1px solid #ddd; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; width: 100%; margin-top: 10px; }
        
        #btn-flotante { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 15px; border-radius: 50px; cursor: pointer; }
        #modal-carrito { display:none; position:fixed; top:10%; right:5%; width:90%; max-width:400px; background:white; padding:20px; border-radius:20px; box-shadow:0 0 20px rgba(0,0,0,0.2); z-index:1000; }
    </style>
</head>
<body>

    <h1>IntimateGem.col</h1>
    <div id="contenedor-productos">Cargando...</div>
    <div id="btn-flotante" onclick="abrirCarrito()">🛒 Carrito</div>

    <div id="modal-carrito">
        <h3>Tu Selección</h3>
        <div id="lista-detallada"></div>
        <button onclick="enviarWhatsApp()">Enviar Pedido por WhatsApp</button>
        <button onclick="this.parentElement.style.display='none'">Cerrar</button>
    </div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg/gviz/tq?tqx=out:json";
    let inventario = [], carrito = [];

    async function cargar() {
        const res = await (await fetch(url)).text();
        const json = JSON.parse(res.substr(47).slice(0, -2));
        inventario = json.table.rows.map(f => ({
            id: f.c[0]?.v, nombre: f.c[1]?.v, precio: f.c[2]?.v, foto1: f.c[3]?.v, 
            descripcion: f.c[7]?.v, tallas: f.c[8]?.v ? f.c[8].v.split(',') : ['U']
        }));
        
        document.getElementById("contenedor-productos").innerHTML = inventario.map(p => `
            <div class="producto-card">
                <img src="${p.foto1}">
                <h3>${p.nombre}</h3>
                <p>${p.descripcion || ''}</p>
                <select id="talla-${p.id}">${p.tallas.map(t => `<option>${t.trim()}</option>`).join('')}</select>
                <input type="number" id="cant-${p.id}" value="1" min="1" style="width:50px;">
                <button onclick="agregar('${p.id}')">Añadir al Carrito</button>
            </div>`).join('');
    }

    function agregar(id) {
        const p = inventario.find(i => i.id == id);
        carrito.push({ ...p, talla: document.getElementById(`talla-${id}`).value, cant: document.getElementById(`cant-${id}`).value });
        alert("Agregado al carrito");
    }

    function abrirCarrito() {
        document.getElementById("lista-detallada").innerHTML = carrito.map((item, i) => 
            `<div>${item.nombre} (Talla: ${item.talla}, Cant: ${item.cant}) <button onclick="carrito.splice(${i},1); abrirCarrito()">X</button></div>`
        ).join('');
        document.getElementById("modal-carrito").style.display = "block";
    }

    function enviarWhatsApp() {
        let msj = "Pedido: " + carrito.map(i => `\n- ${i.nombre} (Talla: ${i.talla}, Cant: ${i.cant})`).join('');
        window.open(`https://wa.me/573014816594?text=${encodeURIComponent(msj)}`);
    }

    cargar();
</script>
</body>
</html>
