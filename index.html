<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <!-- Importamos fuentes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #fcf8f5; 
            font-family: 'Poppins', sans-serif; 
            color: #4a3737; 
            margin: 0; 
            padding: 40px 20px;
            /* Fondo floral delicado */
            background-image: url('https://www.transparenttextures.com/patterns/floral-wallpaper.png');
        }
        h1 { font-family: 'Playfair Display', serif; text-align: center; color: #aa7c7c; margin-bottom: 50px; }
        
        #contenedor-productos { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        
        .producto-card { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            text-align: center; 
            border: 1px solid #e0d0d0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        
        .producto-card img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            border-radius: 20px; 
            margin-bottom: 15px; 
        }
        
        h3 { font-family: 'Playfair Display', serif; margin: 10px 0; }
        
        .precio { color: #aa7c7c; font-weight: bold; margin-bottom: 15px; }
        
        button { 
            background: #aa7c7c; 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 20px; 
            cursor: pointer; 
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>

    <h1>IntimateGem.col</h1>
    <div id="contenedor-productos">Cargando catálogo...</div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg/gviz/tq?tqx=out:json";

    async function cargar() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const contenedor = document.getElementById("contenedor-productos");
            contenedor.innerHTML = ""; 
            
            json.table.rows.forEach(f => {
                if(!f.c[1]) return;
                contenedor.innerHTML += `
                    <div class="producto-card">
                        <img src="${f.c[3]?.v}">
                        <h3>${f.c[1]?.v}</h3>
                        <p class="precio">$${f.c[2]?.v}</p>
                        <button onclick="alert('Agregado')">Añadir al Carrito</button>
                    </div>`;
            });
        } catch(e) {
            document.getElementById("contenedor-productos").innerHTML = "Error al cargar datos.";
        }
    }
    cargar();
</script>
</body>
</html>
