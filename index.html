<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <style>
        body { background: #fcf8f5; font-family: sans-serif; margin: 0; padding: 20px; }
        #contenedor-productos { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 50px; }
        .producto-card { background: white; padding: 15px; border-radius: 15px; width: 250px; text-align: center; }
        .producto-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; }
        #modal-carrito { display:none; position:fixed; top:0; right:0; width:300px; height:100%; background:white; z-index:9999; padding:20px; box-shadow:-5px 0 10px rgba(0,0,0,0.1); }
        #modal-carrito.activo { display:block; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">IntimateGem.col</h1>
    <div id="contenedor-productos">Cargando catálogo...</div>
    <div id="icono-carrito" onclick="document.getElementById('modal-carrito').classList.add('activo')" style="position:fixed; bottom:20px; right:20px; background:#aa7c7c; color:white; padding:15px; border-radius:50px; cursor:pointer;">🛒</div>

    <div id="modal-carrito">
        <h3>Tu pedido</h3>
        <div id="lista-carrito"></div>
        <button onclick="document.getElementById('modal-carrito').classList.remove('activo')">Cerrar</button>
    </div>

<script>
    const url = "https://docs.google.com/spreadsheets/d/1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg/gviz/tq?tqx=out:json";

    async function cargar() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const contenedor = document.getElementById("contenedor-productos");
            contenedor.innerHTML = ""; 
            
            json.table.rows.forEach(f => {
                if(!f.c[1]) return;
                contenedor.innerHTML += `
                    <div class="producto-card">
                        <img src="${f.c[3]?.v}">
                        <h3>${f.c[1]?.v}</h3>
                        <p>$${f.c[2]?.v}</p>
                        <button onclick="alert('Agregado')">Agregar</button>
                    </div>`;
            });
        } catch(e) {
            document.getElementById("contenedor-productos").innerHTML = "Error al cargar datos. Verifica que tu hoja esté publicada en la web.";
        }
    }
    cargar();
</script>
</body>
</html>
