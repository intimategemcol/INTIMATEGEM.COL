<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col | Carrito</title>
    <style>
        body { font-family: sans-serif; background: #fcf8f5; padding: 20px; }
        .producto-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        #modal-carrito { display:none; position:fixed; top:10%; left:5%; width:90%; background:white; padding:20px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.3); z-index:1000; max-height: 80vh; overflow-y: auto; }
        .item-carrito { display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #eee; }
    </style>
</head>
<body>

    <h1>Tienda IntimateGem</h1>
    <div id="contenedor-productos"></div>
    <div id="icono-carrito" onclick="abrirModal()" style="position:fixed; bottom:20px; right:20px; background:#aa7c7c; color:white; padding:15px; border-radius:50px;">🛒 Carrito</div>

    <!-- VENTANA DEL CARRITO -->
    <div id="modal-carrito">
        <h3>Tu Selección</h3>
        <div id="lista-detallada"></div>
        <button onclick="enviarWhatsApp()">Finalizar Pedido por WhatsApp</button>
        <button onclick="document.getElementById('modal-carrito').style.display='none'">Cerrar</button>
    </div>

<script>
    let inventario = [], carrito = [];

    async function cargarTienda() {
        const url = "https://docs.google.com/spreadsheets/d/1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg/gviz/tq?tqx=out:json";
        const res = await (await fetch(url)).text();
        const json = JSON.parse(res.substr(47).slice(0, -2));
        inventario = json.table.rows.map(f => ({
            id: f.c[0]?.v, nombre: f.c[1]?.v, precio: f.c[2]?.v, 
            foto1: f.c[3]?.v, descripcion: f.c[7]?.v, 
            tallas: f.c[8]?.v ? f.c[8].v.split(',') : ['U']
        }));
        
        let html = "";
        inventario.forEach(p => {
            html += `<div class="producto-card">
                <img src="${p.foto1}" style="width:100px;">
                <h3>${p.nombre}</h3>
                <select id="talla-${p.id}">${p.tallas.map(t => `<option>${t.trim()}</option>`).join('')}</select>
                <input type="number" id="cant-${p.id}" value="1" min="1" style="width:50px;">
                <button onclick="agregar('${p.id}')">Agregar</button>
            </div>`;
        });
        document.getElementById("contenedor-productos").innerHTML = html;
    }

    function agregar(id) {
        const p = inventario.find(i => i.id == id);
        carrito.push({ ...p, talla: document.getElementById(`talla-${id}`).value, cant: document.getElementById(`cant-${id}`).value });
        alert("¡Agregado!");
    }

    function abrirModal() {
        let lista = document.getElementById("lista-detallada");
        lista.innerHTML = carrito.map((item, index) => 
            `<div class="item-carrito">${item.nombre} - ${item.talla} - Cant: ${item.cant} <button onclick="carrito.splice(${index},1); abrirModal()">X</button></div>`
        ).join('');
        document.getElementById("modal-carrito").style.display = "block";
    }

    function enviarWhatsApp() {
        let msj = "¡Hola! Quiero comprar: " + carrito.map(i => `\n- ${i.nombre} (Talla: ${i.talla}, Cant: ${i.cant})`).join('');
        window.open(`https://wa.me/573014816594?text=${encodeURIComponent(msj)}`, '_blank');
    }

    cargarTienda();
</script>
</body>
</html>
