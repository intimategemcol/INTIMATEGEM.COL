<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1FRwiNrN4pAvDWtGZ47nBgNfdRtz2RYfZ">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background-color: #ffffff; text-align: center; font-family: 'Poppins', sans-serif; padding-top: 50px; }
        #lateral { position: absolute; left: 20px; top: 50px; width: 180px; text-align: left; font-size: 0.9rem; color: #5a3e3e; z-index: 10; }
        .redes { display: flex; gap: 15px; margin-top: 10px; font-size: 1.4rem; }
        .redes a { color: #8b5d5d; text-decoration: none; transition: 0.3s; }
        .redes a:hover { color: #5a3e3e; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 4rem; color: #8b5d5d; margin: 0; line-height: 1; }
        .eslogan { font-size: 1rem; color: #8b5d5d; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; margin-bottom: 30px; font-weight: 300; }
        .color-marca { color: #8b5d5d; }
        .productos-grid { display: flex; justify-content: center; gap: 40px; padding: 20px; flex-wrap: wrap; margin-top: 50px; }
        .producto-card { width: 320px; border: 1px solid #eee; background: white; padding: 25px; border-radius: 15px; }
        .img-principal { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; }
        .producto-nombre { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #5a3e3e; text-align: center; margin: 15px 0; }
        
        /* Estilos para colores en circulitos */
        .contenedor-colores { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
        .circulo-color { width: 25px; height: 25px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer; transition: transform 0.2s; }
        .circulo-color:hover { transform: scale(1.2); }
        
        select { padding: 5px; border: 1px solid #ccc; border-radius: 5px; color: #5a3e3e; font-size: 0.9rem; margin-top: 5px; }
        .btn-carrito { background-color: #8b5d5d; color: white; border: none; padding: 10px; border-radius: 20px; cursor: pointer; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>

    <div id="lateral">
        <p style="margin:0;"><strong>Tienda Virtual</strong></p>
        <p style="margin:5px 0;">📍 Santa Marta, CO</p>
        <p style="margin:0;">🚚 Envíos Nacionales</p>
        <div class="redes">
            <a href="https://www.instagram.com/intimategem.col" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/message/CHUJGAB3375FG1" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <h1>IntimateGem.col <span class="color-marca" style="font-size: 2rem;">✧</span></h1>
    <div class="productos-grid" id="lista-productos">Cargando catálogo...</div>

    <script>
        const sheetID = "1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        fetch(url).then(res => res.text()).then(data => {
            const json = JSON.parse(data.substr(47).slice(0, -2));
            const container = document.getElementById('lista-productos');
            container.innerHTML = "";

            json.table.rows.forEach((row, index) => {
                const nombre = row.c[1]?.v;
                const precio = row.c[2]?.v;
                const f1 = row.c[3]?.v;
                const tallas = (row.c[8]?.v || "U").split(', ');
                const colores = (row.c[9]?.v || "Black").split(', '); // Columna 10: colores (ej: Black, Red, White)

                const card = document.createElement('div');
                card.className = "producto-card";
                card.innerHTML = `
                    <img src="${f1}" class="img-principal">
                    <div class="producto-nombre">${nombre}</div>
                    <div class="contenedor-colores">
                        ${colores.map(c => `<div class="circulo-color" style="background-color: ${c.trim()};" title="${c.trim()}"></div>`).join('')}
                    </div>
                    <select id="talla-${index}">${tallas.map(t => `<option value="${t}">${t}</option>`).join('')}</select>
                    <div style="font-weight: bold; color:#8b5d5d; margin-top:10px;">$${precio.toLocaleString()}</div>
                    <button class="btn-carrito" onclick="alert('Seleccionado: ${nombre}')">Agregar al Carrito</button>
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>
</html>
