<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #ffffff; text-align: center; font-family: 'Poppins', sans-serif; padding-top: 80px; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 7rem; color: #8b5d5d; margin: 0; line-height: 1; }
        .eslogan { font-size: 1.4rem; color: #8b5d5d; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; margin-bottom: 50px; font-weight: 300; }
        
        .productos-grid { display: flex; justify-content: center; gap: 40px; padding: 20px; flex-wrap: wrap; }
        .producto-card { width: 300px; border: 1px solid #eee; padding: 20px; border-radius: 15px; transition: opacity 0.3s; }
        .producto-card.agotado { opacity: 0.6; filter: grayscale(0.5); }
        
        .img-principal { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; cursor: zoom-in; }
        .galeria-mini { display: flex; gap: 5px; margin: 10px 0; justify-content: center; }
        .mini { width: 60px; height: 60px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; }
        
        .producto-nombre { font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: #5a3e3e; margin: 10px 0; }
        .opciones-compra { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        select { padding: 5px 10px; border: 1px solid #ccc; border-radius: 5px; color: #5a3e3e; outline: none; }
        
        .btn-carrito { background-color: #8b5d5d; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; width: 100%; }
        
        /* Estilos del Carrito Flotante */
        #carrito-flotante { position: fixed; bottom: 20px; right: 20px; background: #5a3e3e; color: white; padding: 15px; border-radius: 15px; cursor: pointer; z-index: 1000; }
        #lista-carrito { display: none; position: fixed; bottom: 80px; right: 20px; background: white; border: 1px solid #ccc; padding: 15px; border-radius: 10px; width: 250px; z-index: 1000; text-align: left; }
    </style>
</head>
<body>

    <h1>IntimateGem.col ✨</h1>
    <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>

    <div class="productos-grid" id="lista-productos">Cargando catálogo...</div>

    <!-- Carrito -->
    <div id="carrito-flotante" onclick="toggleCarrito()">🛒 Mi Carrito (<span id="cuenta">0</span>)</div>
    <div id="lista-carrito">
        <ul id="items-en-carrito" style="list-style:none; padding:0;"></ul>
        <button class="btn-carrito" onclick="enviarPedido()">Finalizar Pedido (WhatsApp)</button>
    </div>

    <script>
        let carrito = [];
        const sheetID = "1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        fetch(url).then(res => res.text()).then(data => {
            const json = JSON.parse(data.substr(47).slice(0, -2));
            const container = document.getElementById('lista-productos');
            container.innerHTML = "";

            json.table.rows.forEach((row, index) => {
                const nombre = row.c[1]?.v;
                const precio = row.c[2]?.v;
                const f1 = row.c[3]?.v;
                const estado = (row.c[6]?.v || "").toLowerCase();
                const tallasRaw = row.c[8]?.v || "U";
                const tallas = tallasRaw.split(', ');

                const card = document.createElement('div');
                card.className = 'producto-card';
                card.innerHTML = `
                    <img src="${f1}" class="img-principal">
                    <div class="producto-nombre">${nombre}</div>
                    ${estado === "agotado" ? '<p>AGOTADO</p>' : `
                        <div class="opciones-compra">
                            <select id="talla-${index}">${tallas.map(t => `<option value="${t}">${t}</option>`).join('')}</select>
                            <select id="cant-${index}"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
                        </div>
                        <button class="btn-carrito" onclick="agregarAlCarrito('${nombre}', ${precio}, 'talla-${index}', 'cant-${index}')">Agregar</button>
                    `}
                `;
                container.appendChild(card);
            });
        });

        function agregarAlCarrito(nombre, precio, idTalla, idCant) {
            const talla = document.getElementById(idTalla).value;
            const cant = document.getElementById(idCant).value;
            carrito.push({ nombre, precio, talla, cant });
            document.getElementById('cuenta').innerText = carrito.length;
            actualizarLista();
        }

        function actualizarLista() {
            const lista = document.getElementById('items-en-carrito');
            lista.innerHTML = carrito.map(i => `<li>${i.nombre} (${i.talla}) x${i.cant}</li>`).join('');
        }

        function toggleCarrito() {
            const l = document.getElementById('lista-carrito');
            l.style.display = l.style.display === 'block' ? 'none' : 'block';
        }

        function enviarPedido() {
            const msg = "¡Hola! Quiero pedir: " + carrito.map(i => `${i.nombre} (Talla: ${i.talla}, Cant: ${i.cant})`).join(', ');
            window.open(`https://wa.me/573000000000?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
