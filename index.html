<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Usamos una imagen de flores más llamativa y elegante */
            background-image: url('https://images.unsplash.com/photo-1596700033883-790754802c63?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            padding-top: 80px;
            /* Un filtro suave para que las flores se vean pero no oculten el texto */
            background-color: rgba(255, 255, 255, 0.6);
            background-blend-mode: lighten;
        }

        .header-container {
            margin-bottom: 40px;
        }

        /* Título limpio, sin fondos */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 6rem; /* Tamaño aumentado */
            color: #8b5d5d;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        .eslogan {
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            color: #555;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: -10px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>IntimateGem.col ✨</h1>
        <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>
    </div>

</body>
</html>
