<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Usamos un color de fondo un poco más claro para que las flores oscuras resalten */
            background-color: #f7f0ed; 
            /* Esta es una imagen de flores más marcada y elegante */
            background-image: url('https://www.transparenttextures.com/patterns/flowers.png');
            text-align: center;
            font-family: 'Poppins', sans-serif;
            padding-top: 50px;
        }

        .header-container {
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: #8b5d5d;
            margin: 0;
        }

        .eslogan {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            color: #8b5d5d;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -10px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>IntimateGem.col ✨</h1>
        <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>
    </div>

</body>
</html>
