<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* Fondo blanco con destellos */
        body { 
            margin: 0; 
            background-color: #ffffff; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><text x="10" y="40" font-size="20" fill="%238b5d5d" opacity="0.3">✨</text><text x="60" y="80" font-size="20" fill="%238b5d5d" opacity="0.3">✨</text></svg>');
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            padding-top: 80px; 
        }
        
        h1 { font-family: 'Great Vibes', cursive; font-size: 7rem; color: #8b5d5d; margin: 0; line-height: 1; }
        .eslogan { font-size: 1.4rem; color: #8b5d5d; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; margin-bottom: 50px; font-weight: 300; }
        
        .productos-grid { display: flex; justify-content: center; gap: 40px; padding: 20px; flex-wrap: wrap; }
        .producto-card { width: 320px; border: 1px solid #eee; background: white; padding: 25px; border-radius: 15px; transition: opacity 0.3s; }
        .producto-card.agotado { opacity: 0.6; filter: grayscale(0.5); }
        
        .img-principal { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; cursor: zoom-in; }
        .galeria-mini { display: flex; gap: 5px; margin: 15px 0; justify-content: center; }
        .mini { width: 65px; height: 65px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; }
        
        .producto-nombre { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #5a3e3e; text-align: center; margin: 15px 0; }
        .producto-desc { font-size: 1.1rem; color: #777; margin-bottom: 20px; min-height: 50px; }
        
        .opciones-compra { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        select { padding: 8px 15px; border: 1px solid #ccc; border-radius: 5px; color: #5a3e3e; outline: none; font-size: 1rem; }
        
        .btn-carrito { background-color: #8b5d5d; color: white; border: none; padding: 15px 25px; border-radius: 20px; cursor: pointer; font-size: 1.1rem; margin-top: 15px; transition: 0.3s; width: 100%; }
        
        .badge-agotado { color: #d9534f; font-weight: bold; font-size: 1.4rem; margin: 15px 0; }

        #carrito-flotante { position: fixed; bottom: 25px; right: 25px; background: #8b5d5d; color: white; padding: 25px 30px; border-radius: 50px; cursor: pointer; z-index: 1000; box-shadow: 0 6px 15px rgba(0,0,0,0.3); font-size: 1.5rem; font-weight: bold; }
        
        #lista-carrito { display: none; position: fixed; bottom: 100px; right: 10px; width: 340px; background: white; border: 1px solid #eee; padding: 15px; border-radius: 15px; z-index: 1000; text-align: left; max-height: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        #items-en-carrito { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 10px; }
        
        .btn-control { cursor: pointer; background: #8b5d5d; color: white; padding: 2px 12px; border-radius: 5px; font-weight: 900; font-size: 1.2rem; display: inline-block; border: 2px solid #5a3e3e; }

        #lightbox { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 999; align-items: center; justify-content: center; }
        #lightbox img { max-width: 98%; max-height: 95%; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .cerrar-zoom { position: absolute; top: 15px; right: 25px; color: white; font-size: 60px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>IntimateGem.col ✨</h1>
    <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>

    <div class="productos-grid" id="lista-productos">Cargando catálogo...</div>

    <div id="carrito-flotante" onclick="toggleCarrito()">🛒 (<span id="cuenta">0</span>)</div>
    <div id="lista-carrito">
        <h3 style="margin:0 0 15px 0; color:#8b5d5d; font-family:'Great Vibes'; font-size:2rem;">Tu Selección</h3>
        <div id="items-en-carrito"></div>
        <div id="area-estatica">
            <div id="total-carrito" style="font-weight:bold; font-size:1.4rem; margin:10px 0; color:#8b5d5d;"></div>
            <button class="btn-carrito" onclick="enviarPedido()" style="padding: 15px; font-size: 1.1rem; margin-top:0;">Finalizar Pedido por WhatsApp</button>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <span class="cerrar-zoom">&times;</span>
        <img id="zoom-img" src="">
    </div>

    <script>
        let carrito = [];
        const sheetID = "1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        fetch(url).then(res => res.text()).then(data => {
            const json = JSON.parse(data.substr(47).slice(0, -2));
            const container = document.getElementById('lista-productos');
            container.innerHTML = "";

            json.table.rows.forEach((row, index) => {
                const nombre = row.c[1]?.v;
                const precio = row.c[2]?.v;
                const f1 = row.c[3]?.v, f2 = row.c[4]?.v, f3 = row.c[5]?.v;
                const estado = (row.c[6]?.v || "").toLowerCase();
                const desc = row.c[7]?.v || "";
                const tallas = (row.c[8]?.v || "U").split(', ');

                const card = document.createElement('div');
                card.className = `producto-card ${estado === 'agotado' ? 'agotado' : ''}`;
                card.innerHTML = `
                    <img src="${f1}" class="img-principal" onclick="abrirZoom('main-${index}')" id="main-${index}">
                    <div class="galeria-mini">
                        <img src="${f1}" class="mini" onclick="cambiarFoto('${index}', '${f1}')">
                        <img src="${f2}" class="mini" onclick="cambiarFoto('${index}', '${f2}')">
                        <img src="${f3}" class="mini" onclick="cambiarFoto('${index}', '${f3}')">
                    </div>
                    <div class="producto-nombre">${nombre}</div>
                    <div class="producto-desc">${desc}</div>
                    ${estado === 'agotado' ? '<div class="badge-agotado">AGOTADO</div>' : `
                        <div class="opciones-compra">
                            <select id="talla-${index}">${tallas.map(t => `<option value="${t}">${t}</option>`).join('')}</select>
                            <select id="cant-${index}"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
                        </div>
                        <div style="font-weight: bold; color:#8b5d5d; margin-top:15px; font-size:1.3rem;">$${precio.toLocaleString()}</div>
                        <button class="btn-carrito" onclick="agregar('${nombre}', ${precio}, '${index}', '${f1}')">Agregar al Carrito</button>
                    `}
                `;
                container.appendChild(card);
            });
        });

        function agregar(nombre, precio, id, img) {
            const talla = document.getElementById(`talla-${id}`).value;
            const cant = parseInt(document.getElementById(`cant-${id}`).value);
            carrito.push({ nombre, precio, talla, cant, img });
            document.getElementById('cuenta').innerText = carrito.length;
            actualizarCarrito();
        }

        function actualizarCarrito() {
            const lista = document.getElementById('items-en-carrito');
            let totalGeneral = 0;
            lista.innerHTML = carrito.map((i, idx) => {
                let subtotal = i.precio * i.cant;
                totalGeneral += subtotal;
                return `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; padding-bottom:10px; border-bottom:1px solid #eee; font-size:1rem;">
                    <img src="${i.img}" style="width:50px; height:50px; border-radius:5px; object-fit:cover;">
                    <div style="flex-grow:1;">
                        <div style="font-weight:700;">${i.nombre} (${i.talla})</div>
                        <div style="color:#8b5d5d;">$${i.precio.toLocaleString()} c/u</div>
                        <div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                            <span class="btn-control" onclick="if(carrito[${idx}].cant>1){carrito[${idx}].cant--; actualizarCarrito();}">-</span>
                            <span style="font-weight:bold; font-size:1.2rem;">${i.cant}</span>
                            <span class="btn-control" onclick="carrito[${idx}].cant++; actualizarCarrito();">+</span>
                        </div>
                    </div>
                    <div style="font-weight:bold; color:#8b5d5d;">$${subtotal.toLocaleString()}</div>
                    <span onclick="carrito.splice(${idx},1); document.getElementById('cuenta').innerText = carrito.length; actualizarCarrito();" style="color:red; cursor:pointer; font-size:1.5rem; margin-left:10px;">&times;</span>
                </div>
            `}).join('');
            document.getElementById('total-carrito').innerText = "Total: $" + totalGeneral.toLocaleString();
        }

        function toggleCarrito() { 
            const car = document.getElementById('lista-carrito');
            car.style.display = car.style.display === 'flex' ? 'none' : 'flex'; 
        }
        function cambiarFoto(id, src) { document.getElementById(`main-${id}`).src = src; }
        function abrirZoom(id) { 
            document.getElementById('zoom-img').src = document.getElementById(id).src; 
            document.getElementById('lightbox').style.display = 'flex'; 
        }
        function enviarPedido() {
            let totalGeneral = carrito.reduce((sum, i) => sum + (i.precio * i.cant), 0);
            let detalles = carrito.map(i => `\n- ${i.nombre} | Talla: ${i.talla} | Cant: ${i.cant} | Subtotal: $${(i.precio * i.cant).toLocaleString()}`).join('');
            const msg = `¡Hola! Quisiera comprar estas prendas:${detalles}\n\nTotal del pedido: $${totalGeneral.toLocaleString()}\n\n¿Me regalas más información, por favor?`;
            window.open(`https://wa.me/573014816594?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
