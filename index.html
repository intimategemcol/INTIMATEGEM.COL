<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Fondo floral elegante y bien visible */
            background-color: #fcf4f2;
            background-image: url('https://img.freepik.com/vector-premium/patron-sin-costuras-flores-acuarela-suaves-tonos-pastel_72739-166.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            padding-top: 80px;
            /* Una capa de color suave encima de la imagen para que el texto resalte */
            background-blend-mode: lighten;
        }

        .header-container {
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.4); /* Fondo semi-transparente para el título */
            padding: 20px;
            border-radius: 20px;
            display: inline-block;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: #8b5d5d;
            margin: 0;
        }

        .eslogan {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            color: #8b5d5d;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: -10px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>IntimateGem.col ✨</h1>
        <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>
    </div>

</body>
</html>
