<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; font-family: 'Poppins', sans-serif; text-align: center; background-color: #ffffff; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 7rem; color: #8b5d5d; margin: 0; }
        .eslogan { color: #8b5d5d; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; }
        
        #contenedor-productos { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .producto { width: 300px; padding: 20px; border: 1px solid #eee; border-radius: 15px; }
        .producto img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>IntimateGem.col ✨</h1>
    <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>

    <div id="contenedor-productos">
        <!-- Producto 1 -->
        <div class="producto">
            <img src="https://lh3.googleusercontent.com/d/1NirUkwXblq43lfWtSjXfldVYrL824hiP" alt="Goddess Set">
            <h3>Goddess Set</h3>
            <p>$45000</p>
        </div>

        <!-- Producto 2 -->
        <div class="producto">
            <img src="https://lh3.googleusercontent.com/d/1NirUkwXblq43lfWtSjXfldVYrL824hiP" alt="Nova Set">
            <h3>Nova Set</h3>
            <p>$22000</p>
        </div>
    </div>

</body>
</html>
