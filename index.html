<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Fondo de flores elegante, estilo boutique, alta definición */
            background-image: url('https://images.unsplash.com/photo-1526045612212-07caf87c5c74?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            /* Eliminamos los filtros de opacidad/transparencia */
            text-align: center;
            font-family: 'Poppins', sans-serif;
            padding-top: 80px;
        }

        .header-container {
            margin-bottom: 40px;
            /* Aseguramos que nada bloquee la vista del fondo */
            background: none !important;
        }

        /* Título sin cajas, sin fondos, tal como lo quieres */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 7rem; 
            color: #5a3e3e; /* Un tono más profundo para que resalte sobre las flores */
            margin: 0;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
        }

        .eslogan {
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            color: #4a3737;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: -15px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>IntimateGem.col ✨</h1>
        <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>
    </div>

</body>
</html>
