<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #ffffff; text-align: center; font-family: 'Poppins', sans-serif; padding-top: 80px; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 7rem; color: #8b5d5d; margin: 0; line-height: 1; }
        .eslogan { font-size: 1.4rem; color: #8b5d5d; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; margin-bottom: 50px; font-weight: 300; }
        
        .productos-grid { display: flex; justify-content: center; gap: 40px; padding: 20px; flex-wrap: wrap; }
        .producto-card { width: 300px; border: 1px solid #eee; padding: 20px; border-radius: 15px; transition: opacity 0.3s; }
        .producto-card.agotado { opacity: 0.6; filter: grayscale(0.5); }
        
        .img-principal { width: 100%; height: 300px; object-fit: cover; border-radius: 10px; cursor: zoom-in; }
        .galeria-mini { display: flex; gap: 5px; margin: 10px 0; justify-content: center; }
        .mini { width: 60px; height: 60px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; }
        
        .producto-nombre { font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: #5a3e3e; text-align: center; margin: 10px 0; }
        .producto-desc { font-size: 0.9rem; color: #777; margin-bottom: 15px; min-height: 40px; }
        
        .opciones-compra { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        select { padding: 5px 10px; border: 1px solid #ccc; border-radius: 5px; color: #5a3e3e; outline: none; font-size: 0.8rem; }
        
        .badge-agotado { color: #d9534f; font-weight: bold; font-size: 1.2rem; margin: 10px 0; }

        #lightbox { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 999; }
        #lightbox img { max-width: 90%; max-height: 80%; margin-top: 5%; border-radius: 10px; }
        .cerrar-zoom { position: absolute; top: 20px; right: 20px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>IntimateGem.col ✨</h1>
    <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>

    <div class="productos-grid" id="lista-productos">Cargando catálogo...</div>

    <div id="lightbox" onclick="this.style.display='none'">
        <span class="cerrar-zoom">&times;</span>
        <img id="zoom-img" src="">
    </div>

    <script>
        const sheetID = "1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        fetch(url).then(res => res.text()).then(data => {
            const json = JSON.parse(data.substr(47).slice(0, -2));
            const container = document.getElementById('lista-productos');
            container.innerHTML = "";

            json.table.rows.forEach(row => {
                const nombre = row.c[1]?.v;
                const precio = row.c[2]?.v;
                const f1 = row.c[3]?.v, f2 = row.c[4]?.v, f3 = row.c[5]?.v;
                const estado = (row.c[6]?.v || "").toLowerCase();
                const desc = row.c[7]?.v || "";
                const tallasRaw = row.c[8]?.v || "U";
                const tallas = tallasRaw.split(', ');

                const isAgotado = estado === "agotado";

                const card = document.createElement('div');
                card.className = `producto-card ${isAgotado ? 'agotado' : ''}`;
                card.innerHTML = `
                    <img src="${f1}" class="img-principal" onclick="abrirZoom('${f1}')" id="main-${nombre.replace(/\s+/g, '')}">
                    <div class="galeria-mini">
                        <img src="${f1}" class="mini" onclick="cambiarFoto('${nombre.replace(/\s+/g, '')}', '${f1}')">
                        <img src="${f2}" class="mini" onclick="cambiarFoto('${nombre.replace(/\s+/g, '')}', '${f2}')">
                        <img src="${f3}" class="mini" onclick="cambiarFoto('${nombre.replace(/\s+/g, '')}', '${f3}')">
                    </div>
                    <div class="producto-nombre">${nombre}</div>
                    <div class="producto-desc">${desc}</div>
                    ${isAgotado ? '<div class="badge-agotado">AGOTADO</div>' : `
                        <div class="opciones-compra">
                            <select>${tallas.map(t => `<option value="${t}">${t}</option>`).join('')}</select>
                            <select><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
                        </div>
                    `}
                    <div style="font-weight: bold; color:#8b5d5d; margin-bottom:10px;">$${precio.toLocaleString()}</div>
                `;
                container.appendChild(card);
            });
        });

        function cambiarFoto(id, src) { document.getElementById(`main-${id}`).src = src; }
        function abrirZoom(src) { 
            document.getElementById('zoom-img').src = src; 
            document.getElementById('lightbox').style.display = 'block'; 
        }
    </script>
</body>
</html>
