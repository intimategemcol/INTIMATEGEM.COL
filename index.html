<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Usamos una imagen de fondo de flores con más color y detalle */
            background-image: url('https://images.unsplash.com/photo-1518524364024-57774705706c?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            padding-top: 80px;
        }

        .header-container {
            margin-bottom: 40px;
            /* Sin fondos, sin sombras, nada que cubra el nombre */
            background: transparent;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 6rem;
            color: #6b3f3f; /* Un tono un poco más oscuro para que resalte sobre las flores */
            margin: 0;
            text-shadow: none; /* Aseguramos que no haya sombras */
        }

        .eslogan {
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            color: #4a2c2c;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: -10px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>IntimateGem.col ✨</h1>
        <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>
    </div>

</body>
</html>
