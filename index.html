<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #ffffff; text-align: center; font-family: 'Poppins', sans-serif; padding-top: 80px; padding-bottom: 80px; }
        h1 { font-family: 'Great Vibes', cursive; font-size: 5rem; color: #8b5d5d; margin: 0; line-height: 1; }
        .eslogan { font-size: 1rem; color: #8b5d5d; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px; margin-bottom: 30px; font-weight: 300; }
        
        .productos-grid { display: flex; justify-content: center; gap: 20px; padding: 10px; flex-wrap: wrap; }
        .producto-card { width: 90%; max-width: 300px; border: 1px solid #eee; padding: 15px; border-radius: 15px; transition: opacity 0.3s; }
        .producto-card.agotado { opacity: 0.6; filter: grayscale(0.5); }
        
        .img-principal { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; cursor: zoom-in; }
        .galeria-mini { display: flex; gap: 5px; margin: 10px 0; justify-content: center; }
        .mini { width: 50px; height: 50px; object-fit: cover; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; }
        
        .producto-nombre { font-family: 'Great Vibes', cursive; font-size: 2rem; color: #5a3e3e; text-align: center; margin: 10px 0; }
        .producto-desc { font-size: 0.8rem; color: #777; margin-bottom: 15px; min-height: 40px; }
        
        .opciones-compra { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        select { padding: 5px; border: 1px solid #ccc; border-radius: 5px; color: #5a3e3e; outline: none; font-size: 0.8rem; }
        
        .btn-carrito { background-color: #8b5d5d; color: white; border: none; padding: 10px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; width: 100%; }
        
        /* Estilos Carrito Móvil */
        #btn-flotante { position: fixed; bottom: 20px; right: 20px; background: #8b5d5d; color: white; padding: 15px; border-radius: 50px; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #panel-carrito { display: none; position: fixed; bottom: 80px; right: 10px; width: 90%; max-width: 350px; background: white; border: 1px solid #ddd; padding: 20px; border-radius: 15px; z-index: 999; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .item-lista { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9rem; }
        
        #lightbox { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 999; }
        #lightbox img { max-width: 90%; max-height: 80%; margin-top: 5%; border-radius: 10px; }
        .cerrar-zoom { position: absolute; top: 20px; right: 20px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>IntimateGem.col ✨</h1>
    <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>

    <div class="productos-grid" id="lista-productos">Cargando...</div>

    <div id="btn-flotante" onclick="toggleCarrito()">🛒 <span id="cuenta">0</span></div>
    <div id="panel-carrito">
        <div id="lista-items"></div>
        <button class="btn-carrito" onclick="enviarWhatsApp()">Finalizar Pedido por WhatsApp</button>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <span class="cerrar-zoom">&times;</span>
        <img id="zoom-img" src="">
    </div>

    <script>
        let carrito = [];
        const sheetID = "1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        fetch(url).then(res => res.text()).then(data => {
            const json = JSON.parse(data.substr(47).slice(0, -2));
            const container = document.getElementById('lista-productos');
            container.innerHTML = "";

            json.table.rows.forEach((row, index) => {
                const nombre = row.c[1]?.v;
                const precio = row.c[2]?.v;
                const f1 = row.c[3]?.v, f2 = row.c[4]?.v, f3 = row.c[5]?.v;
                const estado = (row.c[6]?.v || "").toLowerCase();
                const tallasRaw = row.c[8]?.v || "U";
                const tallas = tallasRaw.split(', ');

                const card = document.createElement('div');
                card.className = `producto-card ${estado === 'agotado' ? 'agotado' : ''}`;
                card.innerHTML = `
                    <img src="${f1}" class="img-principal" onclick="abrirZoom('${f1}')" id="main-${index}">
                    <div class="galeria-mini">
                        <img src="${f1}" class="mini" onclick="cambiarFoto('${index}', '${f1}')">
                        <img src="${f2}" class="mini" onclick="cambiarFoto('${index}', '${f2}')">
                        <img src="${f3}" class="mini" onclick="cambiarFoto('${index}', '${f3}')">
                    </div>
                    <div class="producto-nombre">${nombre}</div>
                    ${estado === 'agotado' ? '<strong>AGOTADO</strong>' : `
                        <div class="opciones-compra">
                            <select id="talla-${index}">${tallas.map(t => `<option value="${t}">${t}</option>`).join('')}</select>
                            <select id="cant-${index}"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select>
                        </div>
                        <button class="btn-carrito" onclick="agregarAlCarrito('${nombre}', ${precio}, '${index}')">Añadir al Carrito</button>
                    `}
                `;
                container.appendChild(card);
            });
        });

        function agregarAlCarrito(nombre, precio, id) {
            const talla = document.getElementById(`talla-${id}`).value;
            const cant = document.getElementById(`cant-${id}`).value;
            carrito.push({ nombre, talla, cant });
            document.getElementById('cuenta').innerText = carrito.length;
            const lista = document.getElementById('lista-items');
            lista.innerHTML += `<div class="item-lista">${nombre} (${talla}) x${cant}</div>`;
        }

        function toggleCarrito() {
            const p = document.getElementById('panel-carrito');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function enviarWhatsApp() {
            const msg = "Hola, quiero pedir: " + carrito.map(i => `${i.nombre} (Talla:${i.talla}, Cant:${i.cant})`).join(', ');
            window.open(`https://wa.me/573000000000?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function cambiarFoto(id, src) { document.getElementById(`main-${id}`).src = src; }
        function abrirZoom(src) { document.getElementById('zoom-img').src = src; document.getElementById('lightbox').style.display = 'block'; }
    </script>
</body>
</html>
