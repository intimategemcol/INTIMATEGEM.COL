<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IntimateGem.col</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            /* Aplicamos la imagen exacta de image_72832b.png */
            background-image: url('https://i.imgur.com/kK53S1M.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            text-align: center;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 80px;
        }

        .header-container {
            width: 100%;
        }

        /* Nombre tal como lo querías, sin cuadros detrás */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 7rem;
            color: #5a3e3e;
            margin: 0;
            line-height: 1;
        }

        .eslogan {
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            color: #4a3737;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 10px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>IntimateGem.col ✨</h1>
        <p class="eslogan">UN ESPACIO ÍNTIMO PARA TI</p>
    </div>

</body>
</html>
