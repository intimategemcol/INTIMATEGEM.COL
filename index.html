<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntimateGem.col | Boutique Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-gold: linear-gradient(45deg, #d4af37, #aa7c7c, #eecaca);
            --pink-soft: #fcf8f5;
            --text-dark: #4a3737;
        }

        body {
            background-color: var(--pink-soft);
    background-image: url('https://www.transparenttextures.com/patterns/floral-paper.png');
    font-family: 'Poppins', sans-serif;
    color: var(--text-dark);
    margin: 0;
    padding: 20px 10px; /* Reducimos el espacio a los lados */
    display: flex;
    flex-direction: column;
    align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
font-family: 'Playfair Display', serif;
    font-size: 8vw; /* Se adapta dinámicamente al tamaño de la pantalla */
    max-font-size: 3.5rem; /* Evita que crezca demasiado en computador */
    margin: 0;
    background: var(--rose-gold);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
        }

        .subtitle {
            font-style: italic;
            font-size: 1.1rem;
            color: #aa7c7c;
            margin-top: 10px;
        }

        #contenedor-productos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
        }

        /* Tarjeta de Producto Luxe */
        .producto-card {
background: white;
    border-radius: 20px;
    padding: 20px;
    width: 90%; /* Se adapta a pantallas pequeñas */
    max-width: 320px; /* Mantiene su tamaño estético en pantallas grandes */
    box-shadow: 0 10px 30px rgba(170, 124, 124, 0.1);
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(170, 124, 124, 0.1);
        }

        .producto-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(170, 124, 124, 0.2);
        }

        .foto-principal {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
            transition: transform 0.5s ease;
        }

        .producto-card:hover .foto-principal {
            transform: scale(1.03);
        }

        .miniaturas {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .miniatura-img {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #eee;
            transition: 0.3s;
        }

        .miniatura-img:hover {
            border-color: #aa7c7c;
            transform: translateY(-2px);
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin: 10px 0;
            color: #333;
        }

        .precio {
            font-weight: 600;
            color: #aa7c7c;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* Botones Rose Gold */
        .controles-cantidad {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-cantidad {
            background: var(--rose-gold);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(170, 124, 124, 0.3);
        }

        .btn-whatsapp {
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .btn-whatsapp:hover {
            background: #1eb954;
            transform: scale(1.02);
        }

        /* Estilo para Agotado */
        .agotado-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .agotado-badge {
            background: #4a3737;
            color: white;
            padding: 10px 30px;
            font-weight: bold;
            transform: rotate(-15deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .is-agotado {
            filter: grayscale(0.8);
            pointer-events: none;
        }

        .is-agotado .agotado-overlay {
            display: flex;
        }
    </style>
</head>
<body>

    <header>
        <h1>IntimateGem.col</h1>
        <p class="subtitle">Lencería que resalta tu brillo natural ✨</p>
    </header>

    <div id="contenedor-productos">
        </div>

<script>
    const idHoja = "1y1XFoMRlOXlloUTOIsXWIPhWTvrLw-edPxpSuuOwhyg";
    const urlGSheets = `https://docs.google.com/spreadsheets/d/${idHoja}/gviz/tq?tqx=out:json`;

    let inventarioProductos = [];
    let cantidades = {};

    async function cargarTienda() {
        try {
            const respuesta = await fetch(urlGSheets);
            const texto = await respuesta.text();
            const datos = JSON.parse(texto.substr(47).slice(0, -2));
            const filas = datos.table.rows;

            inventarioProductos = filas.map(f => ({
                id: f.c[0]?.v || "",
                nombre: f.c[1]?.v || "",
                precio: f.c[2]?.v || 0,
                foto1: f.c[3]?.v || "",
                foto2: f.c[4]?.v || "",
                foto3: f.c[5]?.v || "",
                estado: f.c[6]?.v || "" // Leemos la nueva columna G
            }));

            inventarioProductos.forEach(p => cantidades[p.id] = 1);
            dibujarTienda();
        } catch (e) { console.error("Error:", e); }
    }

    function dibujarTienda() {
        const contenedor = document.getElementById("contenedor-productos");
        contenedor.innerHTML = "";

        inventarioProductos.forEach(p => {
            const agotadoClass = p.estado.toLowerCase() === "agotado" ? "is-agotado" : "";
            
            contenedor.innerHTML += `
                <div class="producto-card ${agotadoClass}">
                    <div class="agotado-overlay"><div class="agotado-badge">AGOTADO</div></div>
                    
                    <img id="main-${p.id}" src="${p.foto1}" class="foto-principal">
                    
                    <div class="miniaturas">
                        <img src="${p.foto1}" class="miniatura-img" onclick="cambiar('${p.id}', this.src)">
                        ${p.foto2 ? `<img src="${p.foto2}" class="miniatura-img" onclick="cambiar('${p.id}', this.src)">` : ''}
                        ${p.foto3 ? `<img src="${p.foto3}" class="miniatura-img" onclick="cambiar('${p.id}', this.src)">` : ''}
                    </div>

                    <h3>${p.nombre}</h3>
                    <div class="precio">$${p.precio.toLocaleString('es-CO')} COP</div>

                    <div class="controles-cantidad">
                        <button class="btn-cantidad" onclick="cambiarCant('${p.id}', -1)">-</button>
                        <span id="cant-${p.id}" style="font-weight:bold">1</span>
                        <button class="btn-cantidad" onclick="cambiarCant('${p.id}', 1)">+</button>
                    </div>

                    <button class="btn-whatsapp" onclick="pedir('${p.id}')">
                        Pedir por WhatsApp 💬
                    </button>
                </div>
            `;
        });
    }

    function cambiar(id, url) { document.getElementById(`main-${id}`).src = url; }

    function cambiarCant(id, n) {
        if (cantidades[id] + n >= 1) {
            cantidades[id] += n;
            document.getElementById(`cant-${id}`).innerText = cantidades[id];
        }
    }

    function pedir(id) {
        const p = inventarioProductos.find(prod => prod.id === id);
        const msj = encodeURIComponent(`¡Hola IntimateGem! ✨ Me encantaría el conjunto *${p.nombre}* (${cantidades[id]} unidad/es).`);
        window.open(`https://wa.me/573014816594?text=${msj}`, '_blank');
    }

    window.onload = cargarTienda;
</script>
</body>
</html>
